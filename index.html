<!DOCTYPE html>
<html>

<head>
<title>Smart Sticker Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:28px;
color:#22c55e;
}

.container{
padding:30px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
flex:1;
border-radius:10px;
text-align:center;
}

.card h2{
margin:0;
}

button{
background:#ef4444;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
text-align:left;
}

.alert{
color:#f87171;
}

.safe{
color:#4ade80;
}

</style>
</head>

<body>

<header>
📦 Smart Sticker Cloud Monitoring Dashboard
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2 id="devices">3</h2>
<p>Total Devices</p>
</div>

<div class="card">
<h2 id="alerts">0</h2>
<p>Total Alerts</p>
</div>

<div class="card">
<h2 class="safe">2</h2>
<p>Safe Packages</p>
</div>

<div class="card">
<h2 class="alert">1</h2>
<p>Tampered</p>
</div>

</div>

<button onclick="trigger()">Simulate Tamper</button>

<h2>Device Status</h2>

<table>
<tr>
<th>Device</th>
<th>Status</th>
</tr>

<tr>
<td>Sticker-01</td>
<td class="safe">Active</td>
</tr>

<tr>
<td>Sticker-02</td>
<td class="safe">Active</td>
</tr>

<tr>
<td>Sticker-03</td>
<td class="alert">Monitoring</td>
</tr>

</table>

<h2>Alert Log</h2>

<table id="alertTable">
<tr>
<th>Time</th>
<th>Event</th>
</tr>
</table>

</div>

<script>

function trigger(){

fetch('/tamper')
.then(r=>r.text())
.then(()=>{
loadAlerts();
});

}

function loadAlerts(){

fetch('/alerts')
.then(r=>r.json())
.then(data=>{

document.getElementById("alerts").innerText=data.length;

let table=document.getElementById("alertTable");

table.innerHTML="<tr><th>Time</th><th>Event</th></tr>";

data.reverse().forEach(a=>{

let row=`<tr>
<td>${new Date().toLocaleTimeString()}</td>
<td class="alert">${a}</td>
</tr>`;

table.innerHTML+=row;

});

});

}

setInterval(loadAlerts,3000);

loadAlerts();

</script>

</body>

</html>
